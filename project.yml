name: ExitLauncher
options:
  bundleIdPrefix: com.exitlauncher
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"

targets:
  ExitLauncher:
    type: application
    platform: macOS
    sources:
      - ExitLauncher
    info:
      path: ExitLauncher/Info.plist
      properties:
        LSUIElement: true
    entitlements:
      path: ExitLauncher/ExitLauncher.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.exitlauncher.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        CODE_SIGN_IDENTITY: "-"
        ENABLE_HARDENED_RUNTIME: false
