name: ExitNode
options:
  bundleIdPrefix: com.exitnode
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"

targets:
  ExitNode:
    type: application
    platform: macOS
    sources:
      - ExitNode
    info:
      path: ExitNode/Info.plist
      properties:
        LSUIElement: true
    entitlements:
      path: ExitNode/ExitNode.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.exitnode.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        CODE_SIGN_IDENTITY: "-"
        ENABLE_HARDENED_RUNTIME: false
